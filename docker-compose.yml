x-app-env: &app-env
  DATABASE_URL: "ecto://${POSTGRES_USER:-liteskill}:${POSTGRES_PASSWORD:-liteskill}@localhost/${POSTGRES_DB:-liteskill}"
  SECRET_KEY_BASE: "${SECRET_KEY_BASE:?SECRET_KEY_BASE is required -- generate with: openssl rand -base64 64}"
  ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ENCRYPTION_KEY is required -- generate with: openssl rand -base64 32}"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liteskill}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liteskill}
      POSTGRES_DB: ${POSTGRES_DB:-liteskill_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liteskill}"]
      interval: 5s
      timeout: 5s
      retries: 5
    network_mode: host

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    network_mode: host
    environment:
      <<: *app-env
      PHX_HOST: "${PHX_HOST:-localhost}"
      FORCE_SSL: "false"
      # OIDC_ISSUER: ""
      # OIDC_CLIENT_ID: ""
      # OIDC_CLIENT_SECRET: ""

  migrate:
    build: .
    command: ["bin/migrate"]
    depends_on:
      db:
        condition: service_healthy
    network_mode: host
    environment:
      <<: *app-env
    profiles:
      - tools

volumes:
  pgdata:
