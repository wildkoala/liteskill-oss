x-app-env: &app-env
  DATABASE_URL: "ecto://${POSTGRES_USER:-liteskill}:${POSTGRES_PASSWORD:-liteskill}@localhost/${POSTGRES_DB:-liteskill}"
  # SECRET_KEY_BASE is auto-generated on first boot if not provided.
  # To persist across container restarts, mount a volume and set LITESKILL_SECRETS_FILE.
  SECRET_KEY_BASE: "${SECRET_KEY_BASE:-}"
  # Encryption is off by default. To enable, set both:
  #   LITESKILL_ENCRYPTION=true
  #   ENCRYPTION_KEY=<your-key>  (generate with: openssl rand -base64 32)

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liteskill}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liteskill}
      POSTGRES_DB: ${POSTGRES_DB:-liteskill}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liteskill}"]
      interval: 5s
      timeout: 5s
      retries: 5
    network_mode: host

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    environment:
      <<: *app-env
      PHX_HOST: "${PHX_HOST:-localhost}"
      FORCE_SSL: "false"
      # OIDC_ISSUER: ""
      # OIDC_CLIENT_ID: ""
      # OIDC_CLIENT_SECRET: ""

  migrate:
    build: .
    command: ["bin/migrate"]
    depends_on:
      db:
        condition: service_healthy
    network_mode: host
    environment:
      <<: *app-env
    profiles:
      - tools

volumes:
  pgdata:
