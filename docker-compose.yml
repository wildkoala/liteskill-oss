x-app-env: &app-env
  DATABASE_URL: "ecto://${POSTGRES_USER:-liteskill}:${POSTGRES_PASSWORD:-liteskill}@db/${POSTGRES_DB:-liteskill}"
  SECRET_KEY_BASE: "${SECRET_KEY_BASE:?SECRET_KEY_BASE is required. Generate with: openssl rand -base64 64}"
  ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ENCRYPTION_KEY is required. Generate with: openssl rand -base64 32}"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liteskill}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liteskill}
      POSTGRES_DB: ${POSTGRES_DB:-liteskill}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liteskill}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      <<: *app-env
      PHX_HOST: "localhost"
      # Optional — uncomment and set to enable SSO
      # OIDC_ISSUER: ""
      # OIDC_CLIENT_ID: ""
      # OIDC_CLIENT_SECRET: ""

  # bin/server already runs migrations on boot. This profile is for
  # manual / offline migration runs (e.g. docker compose run --rm migrate).
  migrate:
    build: .
    command: ["bin/migrate"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *app-env
    profiles:
      - tools

volumes:
  pgdata:
